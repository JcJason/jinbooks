version: '3.8'

services:
  mysql:
    image: mysql:8.4.0
    container_name: jinbooks-mysql
    restart: unless-stopped
    command: --lower_case_table_names=1
    env_file:
      - .env
    environment:
      TZ: Asia/Shanghai
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - jinbooks-network
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u ${MYSQL_USER} -p${MYSQL_PASSWORD} || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  redis:
    image: redis:7.2.4
    container_name: jinbooks-redis
    restart: unless-stopped
    env_file:
      - .env
    environment:
      TZ: Asia/Shanghai
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - jinbooks-network
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD} ping | grep -q PONG"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  backend:
    image: jinbooks:latest
    container_name: jinbooks-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      TZ: Asia/Shanghai
      SERVER_PORT: 2154
    volumes:
      - backend_logs:/jinbooks/logs
    ports:
      - "2154:2154"
    networks:
      - jinbooks-network
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:2154/jinbooks-api/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  frontend:
    image: nginx:1.25.4
    container_name: jinbooks-frontend
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
    volumes:
      - ./jinbooks-ui/dist:/usr/share/nginx/html/jinbooks:ro
      - ./scripts/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    networks:
      - jinbooks-network
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  backend_logs:
    driver: local

networks:
  jinbooks-network:
    driver: bridge