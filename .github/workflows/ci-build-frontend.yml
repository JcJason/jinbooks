name: CI Build Frontend

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache-dependency-path: jinbooks-ui/package-lock.json

    - name: Install dependencies
      working-directory: ./jinbooks-ui
      run: npm ci

    - name: Build frontend
      working-directory: ./jinbooks-ui
      run: npm run build

    - name: Verify build output
      run: ls -la jinbooks-ui/dist/

    - name: Upload frontend artifact
      uses: actions/upload-artifact@v4
      with:
        name: jinbooks-frontend
        path: jinbooks-ui/dist/