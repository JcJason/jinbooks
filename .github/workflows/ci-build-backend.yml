name: CI Build & Docker Export

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Grant execute permission for gradlew
      run: chmod +x jinbooks/gradlew

    - name: Build with Gradle
      working-directory: ./jinbooks
      run: ./gradlew clean build -x test

    - name: Upload jar artifact
      uses: actions/upload-artifact@v4
      with:
        name: jinbooks-boot-jar
        path: jinbooks/build/*.jar

    - name: Verify build output
      run: ls -la jinbooks/build/

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker image
      uses: docker/build-push-action@v5
      with:
        context: ./jinbooks/jinbooks-web
        push: false
        tags: jinbooks:latest
        labels: |
          org.opencontainers.image.authors=JinBooks <support@jinbooks.com>
          org.opencontainers.image.description=JinBooks财务记账系统 - 后端服务
        build-args: |
          JAR_FILE=../build/jinbooks-boot-*-ga.jar

    - name: Export Docker image to tar
      run: docker save jinbooks:latest -o jinbooks/build/jinbooks-docker.tar

    - name: Verify tar file
      run: ls -la jinbooks/build/

    - name: Upload docker tar artifact
      uses: actions/upload-artifact@v4
      with:
        name: jinbooks-docker-tar
        path: jinbooks/build/jinbooks-docker.tar